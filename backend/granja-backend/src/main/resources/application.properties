spring.application.name=granja-backend
# ==========================================
# CONFIGURA«√O DO BANCO DE DADOS - MySQL
# ==========================================

# URL de conex„o com o banco
spring.datasource.url=jdbc:mysql://localhost:3306/granja_db?useTimezone=true&serverTimezone=UTC

# Credenciais do MySQL
spring.datasource.username=root
spring.datasource.password=88380590

# Driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURA«√O JPA/HIBERNATE
# ==========================================

# Atualiza o banco automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra os comandos SQL no console
spring.jpa.show-sql=true

# Formata o SQL mostrado
spring.jpa.properties.hibernate.format_sql=true

# Dialeto do MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# CONFIGURA«√O DO SERVIDOR
# ==========================================

# Porta do servidor
server.port=8081